name: Metals & Mining digest

concurrency:
  group: repo-writes
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 5 * * 1-5'
    - cron: '0 17 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
        run: python digest.py
      - name: Commit updated state
        run: |
          git config user.name  "metals-bot"
          git config user.email "bot@noreply.local"
          git add state.json history.json || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "state: $(date -u +%Y-%m-%d_%H-%MZ)"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            git push origin HEAD:main && exit 0
            echo "retry $i"; sleep $((RANDOM % 6 + 2))
          done
          echo "push failed after 5 retries"; exit 1
