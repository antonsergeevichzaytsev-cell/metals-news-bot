name: Evening digest

concurrency:
  group: repo-writes
  cancel-in-progress: false
  # queue: max — без этого GitHub по умолчанию отменяет все PENDING прогоны
  # в группе кроме последнего (даже с cancel-in-progress: false, который
  # защищает только уже ЗАПУЩЕННЫЙ прогон). Найдено 21.07: 4 из 8 ручных
  # dispatch отменились именно так — не гонка пуша, а вытеснение из очереди.
  queue: max

on:
  schedule:
    - cron: '30 15 * * 1-5'   # 18:30 MSK
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run evening digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python evening_digest.py
      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state_evening_digest.json || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "evening_digest state: $(date -u +%Y-%m-%d_%H-%MZ)"
          for i in 1 2 3 4 5 6 7 8; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            git push origin HEAD:main && exit 0
            echo "retry $i"; sleep $((RANDOM % 10 + 5))
          done
          echo "push failed after 8 retries"; exit 1
