name: Setup cron-job.org (one-shot)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Create cron-job.org jobs
        env:
          CRONJOB_ORG_API_KEY: ${{ secrets.CRONJOB_ORG_API_KEY }}
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: python setup_cronjob_org.py
