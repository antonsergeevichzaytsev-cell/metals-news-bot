name: Setup cron-job.org (one-shot)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Create cron-job.org jobs (SKIPPED - already ran)
        if: false
        env:
          CRONJOB_ORG_API_KEY: ${{ secrets.CRONJOB_ORG_API_KEY }}
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: python setup_cronjob_org.py
      - name: Verify jobs were created
        env:
          CRONJOB_ORG_API_KEY: ${{ secrets.CRONJOB_ORG_API_KEY }}
        run: python verify_cronjob_org.py
      - name: Commit status file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cronjob_org_status.txt
          git diff --cached --quiet && exit 0
          git commit -m "cronjob_org_status: $(date -u +%Y-%m-%d_%H-%MZ)"
          git push origin HEAD:main
