name: Inbox consolidator

on:
  schedule:
    # Mon-Fri 10:00, 12:00, 14:00, 16:00, 18:00 MSK = 07:00, 09:00, 11:00, 13:00, 15:00 UTC
    - cron: '0 7,9,11,13,15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run inbox consolidator
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python inbox.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state_inbox.json || true
          git diff --cached --quiet || git commit -m "state_inbox: $(date -u +%Y-%m-%d_%H-%MZ)"
          git push
