name: LinkedIn ideas

concurrency:
  group: repo-writes
  cancel-in-progress: false
  queue: max

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 09:00 MSK — после утреннего digest/filings/mission_control
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ideas:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run LinkedIn ideas
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
        run: python linkedin_ideas.py
      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state_linkedin_ideas.json || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "linkedin_ideas state: $(date -u +%Y-%m-%d_%H-%MZ)"
          for i in 1 2 3 4 5 6 7 8; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            git push origin HEAD:main && exit 0
            echo "retry $i"; sleep $((RANDOM % 10 + 5))
          done
          echo "push failed after 8 retries"; exit 1
