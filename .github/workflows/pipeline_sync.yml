name: Pipeline sync

concurrency:
  group: repo-writes
  cancel-in-progress: false

on:
  schedule:
    - cron: '0,30 7-15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run pipeline sync
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline_sync.py
      - name: Commit pipeline + state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline.json state_pipeline_sync.json || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "pipeline_sync: $(date -u +%Y-%m-%d_%H-%MZ)"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            git push origin HEAD:main && exit 0
            echo "retry $i"; sleep $((RANDOM % 6 + 2))
          done
          echo "push failed after 5 retries"; exit 1
