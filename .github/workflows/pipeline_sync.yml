name: Pipeline sync

on:
  schedule:
    # Каждые 30 мин Mon-Fri 10:00-18:30 MSK = 07:00-15:30 UTC
    - cron: '0,30 7-15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pipeline sync
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline_sync.py

      - name: Commit pipeline + state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline.json state_pipeline_sync.json || true
          git diff --cached --quiet || git commit -m "pipeline_sync: $(date -u +%Y-%m-%d_%H-%MZ)"
          git pull --rebase origin main
          git push
