name: Pipeline sync

concurrency:
  group: repo-writes
  cancel-in-progress: false
  # queue: max — без этого GitHub по умолчанию отменяет все PENDING прогоны
  # в группе кроме последнего (даже с cancel-in-progress: false, который
  # защищает только уже ЗАПУЩЕННЫЙ прогон). Найдено 21.07: 4 из 8 ручных
  # dispatch отменились именно так — не гонка пуша, а вытеснение из очереди.
  queue: max

on:
  schedule:
    - cron: '0,30 7-15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run pipeline sync
        id: sync
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python pipeline_sync.py
      - name: Commit pipeline + state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline.json state_pipeline_sync.json || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "pipeline_sync: $(date -u +%Y-%m-%d_%H-%MZ)"
          for i in 1 2 3 4 5 6 7 8; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            git push origin HEAD:main && exit 0
            echo "retry $i"; sleep $((RANDOM % 10 + 5))
          done
          echo "push failed after 8 retries"; exit 1
      - name: Trigger account watch if new leads appeared
        if: steps.sync.outputs.new_leads != '' && steps.sync.outputs.new_leads != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "New leads this run: ${{ steps.sync.outputs.new_leads }} - dispatching account_watch now instead of waiting for its own schedule"
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/account_watch.yml/dispatches" \
            -d '{"ref":"main"}'
