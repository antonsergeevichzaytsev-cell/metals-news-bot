name: Filings watcher

concurrency:
  group: repo-writes
  cancel-in-progress: false

on:
  schedule:
    # UTC. Вайр Newsfile канадский: пик 09:00-18:00 ET = 13:00-22:00 UTC.
    # Ленты отдают по 10 позиций — частим, иначе теряем.
    - cron: '30 5 * * 1-5'    # 08:30 MSK — сгребает ночной улов из очереди
    - cron: '0 13 * * 1-5'    # 16:00 MSK
    - cron: '0 16 * * 1-5'    # 19:00 MSK
    - cron: '0 19 * * 1-5'    # 22:00 MSK
    - cron: '0 22 * * 1-5'    # 01:00 MSK — тихие часы: копит, не шлёт
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  filings:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run filings watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
        run: python filings.py
      - name: Commit updated state
        run: |
          git config user.name  "metals-bot"
          git config user.email "bot@noreply.local"
          git add state_filings.json filings_history.json || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "filings state: $(date -u +%Y-%m-%d_%H-%MZ)"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            git push origin HEAD:main && exit 0
            echo "retry $i"; sleep $((RANDOM % 6 + 2))
          done
          echo "push failed after 5 retries"; exit 1
